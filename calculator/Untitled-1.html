
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Примитивный калькулятор | HTML + JS</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; 
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* карточка калькулятора */
        .calculator {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* экран ввода (input) */
        .display-wrap {
            background: #0f1219;
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        #expressionInput {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 2.5rem;
            font-weight: 500;
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #e2e8f0;
            text-align: right;
            outline: none;
            padding: 0;
            letter-spacing: 1px;
        }

        /* блок с историей */
        .history-section {
            background: #0f1219cc;
            border-radius: 28px;
            padding: 12px 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .history-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }

        .clear-history {
            background: #2d3a4e;
            border: none;
            color: #facc15;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .clear-history:hover {
            background: #3b4a60;
            color: #fde047;
            transform: scale(0.97);
        }

        #historyLog {
            min-height: 95px;
            max-height: 140px;
            overflow-y: auto;
            font-family: 'Segoe UI', 'Courier New', monospace;
            font-size: 0.9rem;
            color: #b9c7d9;
            padding-right: 6px;
        }

        .history-entry {
            background: #1e293b80;
            margin: 6px 0;
            padding: 6px 12px;
            border-radius: 20px;
            border-left: 3px solid #facc15;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-word;
        }

        
        .buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background: #1e293b;
            border: none;
            padding: 18px 0;
            font-size: 1.6rem;
            font-weight: 600;
            border-radius: 28px;
            color: #f1f5f9;
            transition: all 0.15s ease;
            cursor: pointer;
            box-shadow: 0 5px 0 #0f1117;
            font-family: monospace;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f1117;
        }

        .digit {
            background: #2d3a4e;
            color: #facc15;
        }

        .operator {
            background: #334155;
            color: #7aa2f7;
            font-size: 1.8rem;
        }

        .equals {
            background: #0f7b6e;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 5px 0 #065a4f;
        }

        .clear-btn {
            background: #4a2e3b;
            color: #fda4af;
            font-size: 1.2rem;
        }

        button:hover {
            filter: brightness(1.08);
        }

        
        @media (max-width: 500px) {
            .buttons-panel {
                gap: 10px;
            }
            button {
                padding: 14px 0;
                font-size: 1.4rem;
            }
            #expressionInput {
                font-size: 1.8rem;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #5b6e8c;
        }
    </style>
</head>
<body>

<div class="calculator">
    <!-- поле ручного ввода -->
    <div class="display-wrap">
        <input type="text" id="expressionInput" placeholder="0" value="">
    </div>

    <!-- блок истории действий -->
    <div class="history-section">
        <div class="history-header">
            <h3>📜 История вычислений</h3>
            <button class="clear-history" id="clearHistoryBtn">🗑 Очистить</button>
        </div>
        <div id="historyLog">
            <!-- сюда динамически через append будут добавляться записи -->
            <div style="color:#6c7a91; text-align:center; padding: 8px;">—  пока пусто —</div>
        </div>
    </div>

    <!-- панель кнопок -->
    <div class="buttons-panel">
        <!-- 1 строка -->
        <button class="digit" data-value="7">7</button>
        <button class="digit" data-value="8">8</button>
        <button class="digit" data-value="9">9</button>
        <button class="operator" data-op="/">/</button>

        <!-- 2 строка -->
        <button class="digit" data-value="4">4</button>
        <button class="digit" data-value="5">5</button>
        <button class="digit" data-value="6">6</button>
        <button class="operator" data-op="*">*</button>

        <!-- 3 строка -->
        <button class="digit" data-value="1">1</button>
        <button class="digit" data-value="2">2</button>
        <button class="digit" data-value="3">3</button>
        <button class="operator" data-op="-">-</button>

        <!-- 4 строка -->
        <button class="digit" data-value="0">0</button>
        <button class="clear-btn" id="clearBtn">C</button>
        <button class="operator" data-op="+">+</button>
        <button class="equals" id="equalsBtn">=</button>
    </div>
    <footer>▲ нажми = → результат в истории</footer>
</div>

<script>
    // ---------- DOM элементы ----------
    const inputField = document.getElementById('expressionInput');
    const historyContainer = document.getElementById('historyLog');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const clearBtn = document.getElementById('clearBtn');
    const equalsBtn = document.getElementById('equalsBtn');

    
    function removeEmptyPlaceholder() {
        
        if (historyContainer.children.length === 1 && 
            historyContainer.children[0].innerText.includes('— пока пусто —')) {
            historyContainer.innerHTML = '';  
        }
    }

    
    function addToHistory(expressionString, resultValue) {
       
        let resultFormatted = resultValue;
        
        if (typeof resultValue === 'number') {
          
            resultFormatted = Number.isInteger(resultValue) ? resultValue : parseFloat(resultValue.toFixed(8));
        }
        const historyEntryText = `${expressionString} = ${resultFormatted}`;
        
    
        removeEmptyPlaceholder();
        
        
        const entryDiv = document.createElement('div');
        entryDiv.className = 'history-entry';
        entryDiv.textContent = historyEntryText;
        
       
        historyContainer.append(entryDiv);
        
       
        historyContainer.scrollTop = historyContainer.scrollHeight;
    }

   
    function add(a, b) { return a + b; }
    function subtract(a, b) { return a - b; }
    function multiply(a, b) { return a * b; }
    function divide(a, b) {
        if (b === 0) {
            throw new Error('Деление на ноль!');
        }
        return a / b;
    }

    
    function computeFromExpression(expr) {
        
        expr = expr.trim();
        if (expr === "") return null;

       
        let operator = null;
        let opIndex = -1;
        const operators = ['+', '-', '*', '/'];
        
        
        for (let i = 0; i < expr.length; i++) {
            const ch = expr[i];
            if (operators.includes(ch)) {
               
                if (i > 0) {
                    
                    operator = ch;
                    opIndex = i;
                    break;
                } else if (ch === '-' && i === 0) {
                    
                    continue;
                } else {
                 
                    continue;
                }
            }
        }
        
        if (!operator || opIndex === -1) {
            throw new Error('Неверный формат. Используйте: число оператор число (например 12+7)');
        }
        
       
        let leftStr = expr.substring(0, opIndex).trim();
        let rightStr = expr.substring(opIndex + 1).trim();
        
        if (leftStr === "" || rightStr === "") {
            throw new Error('Ошибка: не хватает операндов');
        }
        
        let leftNum = parseFloat(leftStr);
        let rightNum = parseFloat(rightStr);
        
        if (isNaN(leftNum) || isNaN(rightNum)) {
            throw new Error('Операнды должны быть числами');
        }
        
        
        let result;
        switch (operator) {
            case '+':
                result = add(leftNum, rightNum);
                break;
            case '-':
                result = subtract(leftNum, rightNum);
                break;
            case '*':
                result = multiply(leftNum, rightNum);
                break;
            case '/':
                result = divide(leftNum, rightNum);
                break;
            default:
                throw new Error('Неподдерживаемая операция');
        }
        return result;
    }

   
    function handleEquals() {
        let currentExpression = inputField.value.trim();
        if (currentExpression === "") {
            
            addTemporaryInfo("Введите выражение");
            return;
        }
        
        let computedResult;
        let expressionForHistory = currentExpression;   // сохраняем для истории
        
        try {
            computedResult = computeFromExpression(currentExpression);
         
            if (computedResult === undefined || computedResult === null) {
                throw new Error('Не удалось вычислить');
            }
            
            if (typeof computedResult === 'number' && !Number.isInteger(computedResult)) {
                computedResult = parseFloat(computedResult.toFixed(10));
            }
           
            inputField.value = computedResult;
            
            
            addToHistory(expressionForHistory, computedResult);
            
        } catch (error) {
            
            inputField.value = "Ошибка";
      
            setTimeout(() => {
                if (inputField.value === "Ошибка") {
                    inputField.value = currentExpression; 
                }
            }, 1200);
            
            addTemporaryInfo(error.message);
        }
    }
    

    function addTemporaryInfo(msg) {
        removeEmptyPlaceholder();
        const tempDiv = document.createElement('div');
        tempDiv.className = 'history-entry';
        tempDiv.style.background = "#4a2e3b80";
        tempDiv.style.borderLeftColor = "#f87171";
        tempDiv.textContent = `⚠️ ${msg}`;
        historyContainer.append(tempDiv);
        setTimeout(() => {
            if (tempDiv && tempDiv.remove) tempDiv.remove();
           
            if (historyContainer.children.length === 0) {
                historyContainer.innerHTML = '<div style="color:#6c7a91; text-align:center; padding: 8px;">— пока пусто —</div>';
            }
        }, 2000);
    }

    
    function appendToInput(value) {
        let current = inputField.value;
        
        if (current === "Ошибка") {
            inputField.value = "";
            current = "";
        }
      
        inputField.value = current + value;
    }
    
 
    function clearInput() {
        inputField.value = "";
    }
    

    function clearHistory() {
        historyContainer.innerHTML = '<div style="color:#6c7a91; text-align:center; padding: 8px;">— пока пусто —</div>';
        
    }
    
    
    const digitButtons = document.querySelectorAll('.digit');
    digitButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const val = btn.getAttribute('data-value');
            if (val !== null) appendToInput(val);
        });
    });
    

    const operatorBtns = document.querySelectorAll('.operator');
    operatorBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const op = btn.getAttribute('data-op');
            if (op) appendToInput(op);
        });
    });
    
   
    clearBtn.addEventListener('click', clearInput);
    
    
    equalsBtn.addEventListener('click', handleEquals);
    
   
    clearHistoryBtn.addEventListener('click', clearHistory);
    
    
    inputField.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            handleEquals();
        }
    });
    
    
    console.log("Калькулятор готов. History-блок работает через append!");
</script>
</body>
</html>
